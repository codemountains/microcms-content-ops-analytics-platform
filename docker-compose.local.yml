services:
  webhook-ingest-image:
    image: webhook-ingest:local
    build:
      context: .
      dockerfile: webhook-ingest/Dockerfile
      args:
        CARGO_PROFILE: debug
        CARGO_BUILD_JOBS: ${CARGO_BUILD_JOBS:-1}
    profiles:
      - build-images

  floci:
    image: floci/floci:latest
    ports:
      - "${FLOCI_PORT:-4566}:4566"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock

  duckdb-query-api:
    build:
      context: .
      dockerfile: duckdb-query-api/Dockerfile
      args:
        CARGO_PROFILE: release
        CARGO_BUILD_JOBS: ${CARGO_BUILD_JOBS:-1}
    depends_on:
      - floci
    environment:
      EVENTS_PATH: ${LOCAL_EVENTS_PATH:-s3://microcms-content-ops-events-local/microcms_events/**/*.parquet}
      AWS_REGION: ${AWS_REGION:-ap-northeast-1}
      AWS_ACCESS_KEY_ID: test
      AWS_SECRET_ACCESS_KEY: test
      DUCKDB_EXTENSION_DIRECTORY: /tmp/duckdb_extensions
      DUCKDB_S3_ENDPOINT: floci:4566
      DUCKDB_S3_URL_STYLE: path
      DUCKDB_S3_USE_SSL: "false"
      PORT: 8000
    ports:
      - "8000:8000"

  grafana:
    image: grafana/grafana:12.0.2
    depends_on:
      - duckdb-query-api
    environment:
      GF_INSTALL_PLUGINS: marcusolsson-json-datasource
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Admin
      GF_USERS_DEFAULT_THEME: light
    ports:
      - "3000:3000"
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro

  ngrok:
    image: ngrok/ngrok:3
    depends_on:
      - floci
    environment:
      NGROK_AUTHTOKEN: ${NGROK_AUTHTOKEN:?Set NGROK_AUTHTOKEN in .env}
    command:
      - http
      - --log=stdout
      - --config=/etc/ngrok/ngrok.yml
      - http://floci:4566
    ports:
      - "4040:4040"
    volumes:
      - ./ngrok.local.yml:/etc/ngrok/ngrok.yml:ro
