name: Infra

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  OPENTOFU_VERSION: "1.12.3"

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      infra_any: ${{ steps.filter.outputs.infra_any }}
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Detect infra changes
        id: filter
        env:
          EVENT_NAME: ${{ github.event_name }}
          PR_BASE_SHA: ${{ github.event.pull_request.base.sha }}
          PUSH_BEFORE: ${{ github.event.before }}
        run: |
          if [ "$EVENT_NAME" = "pull_request" ]; then
            base="$PR_BASE_SHA"
          elif [ -n "$PUSH_BEFORE" ] && ! printf '%s' "$PUSH_BEFORE" | grep -Eq '^0+$'; then
            base="$PUSH_BEFORE"
          else
            base="$(git rev-list --max-parents=0 "$GITHUB_SHA")"
          fi

          git cat-file -e "$base^{commit}" 2>/dev/null || git fetch --no-tags --depth=1 origin "$base"
          git diff --name-only "$base" "$GITHUB_SHA" > changed-files.txt

          infra_any=false
          if grep -Eq '^(infra/|grafana/|scripts/|docker-compose(\.local)?\.yml$|justfile$|\.github/workflows/infra\.yml$)' changed-files.txt; then
            infra_any=true
          fi

          echo "infra_any=$infra_any" >> "$GITHUB_OUTPUT"

  validate:
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.infra_any == 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup just
        uses: extractions/setup-just@53165ef7e734c5c07cb06b3c8e7b647c5aa16db3 # v4

      - name: Setup OpenTofu
        uses: opentofu/setup-opentofu@a1320f892987e89d278cc92dc5adc984fb93aca4 # v2.0.2
        with:
          tofu_version: ${{ env.OPENTOFU_VERSION }}
          tofu_wrapper: false

      - name: Validate infra, Compose, and Grafana
        run: just validate

  fmt:
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.infra_any == 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup OpenTofu
        uses: opentofu/setup-opentofu@a1320f892987e89d278cc92dc5adc984fb93aca4 # v2.0.2
        with:
          tofu_version: ${{ env.OPENTOFU_VERSION }}
          tofu_wrapper: false

      - name: Check IaC formatting
        run: tofu fmt -check -recursive infra
