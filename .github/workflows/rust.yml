name: Rust

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  fmt:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Rust cache
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1

      - name: Install rustfmt
        run: rustup component add rustfmt

      - name: Check Rust formatting
        run: cargo fmt --all --check

  webhook-ingest-test-and-clippy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Rust cache
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1

      - name: Install Clippy
        run: rustup component add clippy

      - name: Test webhook-ingest
        run: cargo test -p webhook-ingest

      - name: Run webhook-ingest Clippy
        run: cargo clippy -p webhook-ingest --all-targets -- -D warnings

  duckdb-query-api-test-and-clippy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Rust cache
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1

      - name: Install Clippy
        run: rustup component add clippy

      - name: Test duckdb-query-api
        run: cargo test -p duckdb-query-api

      - name: Run duckdb-query-api Clippy
        run: cargo clippy -p duckdb-query-api --all-targets -- -D warnings
