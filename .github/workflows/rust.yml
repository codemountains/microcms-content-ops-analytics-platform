name: Rust

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      rust_any: ${{ steps.filter.outputs.rust_any }}
      webhook_ingest: ${{ steps.filter.outputs.webhook_ingest }}
      duckdb_query_api: ${{ steps.filter.outputs.duckdb_query_api }}
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Detect Rust changes
        id: filter
        env:
          EVENT_NAME: ${{ github.event_name }}
          PR_BASE_SHA: ${{ github.event.pull_request.base.sha }}
          PUSH_BEFORE: ${{ github.event.before }}
        run: |
          if [ "$EVENT_NAME" = "pull_request" ]; then
            base="$PR_BASE_SHA"
          elif [ -n "$PUSH_BEFORE" ] && ! printf '%s' "$PUSH_BEFORE" | grep -Eq '^0+$'; then
            base="$PUSH_BEFORE"
          else
            base="$(git rev-list --max-parents=0 "$GITHUB_SHA")"
          fi

          git cat-file -e "$base^{commit}" 2>/dev/null || git fetch --no-tags --depth=1 origin "$base"
          git diff --name-only "$base" "$GITHUB_SHA" > changed-files.txt

          webhook_ingest=false
          duckdb_query_api=false
          if grep -Eq '^(webhook-ingest/|Cargo\.toml$|Cargo\.lock$|\.github/workflows/rust\.yml$)' changed-files.txt; then
            webhook_ingest=true
          fi
          if grep -Eq '^(duckdb-query-api/|Cargo\.toml$|Cargo\.lock$|\.github/workflows/rust\.yml$)' changed-files.txt; then
            duckdb_query_api=true
          fi

          rust_any=false
          if [ "$webhook_ingest" = "true" ] || [ "$duckdb_query_api" = "true" ]; then
            rust_any=true
          fi

          {
            echo "rust_any=$rust_any"
            echo "webhook_ingest=$webhook_ingest"
            echo "duckdb_query_api=$duckdb_query_api"
          } >> "$GITHUB_OUTPUT"

  fmt:
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.rust_any == 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Rust cache
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1

      - name: Install rustfmt
        run: rustup component add rustfmt

      - name: Check Rust formatting
        run: cargo fmt --all --check

  webhook-ingest-test-and-clippy:
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.webhook_ingest == 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Rust cache
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1

      - name: Install Clippy
        run: rustup component add clippy

      - name: Test webhook-ingest
        run: cargo test -p webhook-ingest

      - name: Run webhook-ingest Clippy
        run: cargo clippy -p webhook-ingest --all-targets -- -D warnings

  duckdb-query-api-test-and-clippy:
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.duckdb_query_api == 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Rust cache
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1

      - name: Install Clippy
        run: rustup component add clippy

      - name: Test duckdb-query-api
        run: cargo test -p duckdb-query-api

      - name: Run duckdb-query-api Clippy
        run: cargo clippy -p duckdb-query-api --all-targets -- -D warnings
